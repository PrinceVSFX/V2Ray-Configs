name: 🔄 Auto Update Configs

on:
  schedule:
    - cron: '0 * * * *'   # каждый час
  workflow_dispatch:

permissions:
  contents: write   # ВАЖНО: разрешение на push

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🌐 Download latest configs
        run: |
          curl -fsSL https://raw.githubusercontent.com/PrinceVSFX/V2Ray-Configs/main/Vless_list.txt -o Vless_list.txt
          curl -fsSL https://raw.githubusercontent.com/PrinceVSFX/V2Ray-Configs/main/White_list.txt -o White_list.txt

      - name: 🔍 Check for changes
        id: changes
        run: |
          git diff --quiet && echo "no_changes=true" >> $GITHUB_OUTPUT || echo "no_changes=false" >> $GITHUB_OUTPUT

      - name: 💾 Commit and push
        if: steps.changes.outputs.no_changes == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"
          git add Vless_list.txt White_list.txt
          git commit -m "🔄 Auto update configs"
          git push
